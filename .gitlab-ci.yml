stages:
  - build
  - publish

variables:
  # GitLab Container Registry image path for this project.
  IMAGE_NAME: $CI_REGISTRY_IMAGE

# Build, vet and test the Go code. Mirrors the GitHub "Build & Test" job.
build:
  stage: build
  image: golang:1.25-alpine
  variables:
    # Cache the Go module/build cache inside the project dir so GitLab can cache it.
    GOPATH: $CI_PROJECT_DIR/.go
  cache:
    key:
      files:
        - go.mod
        - go.sum
    paths:
      - .go/pkg/mod/
  before_script:
    - apk add --no-cache git
  script:
    - go build ./...
    - go vet ./...
    - go test ./...
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# Build the image with Kaniko and push it to the GitLab Container Registry.
# Mirrors the GitHub "Publish image to GHCR" job (skipped on merge requests).
publish:
  stage: publish
  needs: ["build"]
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script:
    # Authenticate Kaniko against the GitLab Container Registry.
    - mkdir -p /kaniko/.docker
    - |
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    # Compute the set of tags equivalent to the docker/metadata-action config:
    #   - branch / tag name (sanitized), short SHA, and `latest` on the default branch.
    - |
      DEST_ARGS=""
      add_tag() { DEST_ARGS="$DEST_ARGS --destination $IMAGE_NAME:$1"; }

      # Sanitize ref names into valid Docker tags.
      SAFE_REF="$(echo "${CI_COMMIT_TAG:-$CI_COMMIT_BRANCH}" | tr '/' '-' | tr -cd '[:alnum:]._-')"
      add_tag "$SAFE_REF"
      add_tag "sha-${CI_COMMIT_SHORT_SHA}"

      if [ -n "$CI_COMMIT_TAG" ]; then
        # Semver tags like v1.2.3 -> also push 1.2.3 and 1.2.
        VERSION="${CI_COMMIT_TAG#v}"
        add_tag "$VERSION"
        MAJOR_MINOR="$(echo "$VERSION" | cut -d. -f1,2)"
        add_tag "$MAJOR_MINOR"
      fi

      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        add_tag "latest"
      fi

      echo "Pushing tags:$DEST_ARGS"
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --cache=true \
        $DEST_ARGS
  rules:
    # Don't publish on merge requests (matches the GitHub `!= 'pull_request'` guard).
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_TAG
